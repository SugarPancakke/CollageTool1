<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Collage Tool</title>

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  color: white;
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: #2b1118;
  padding: 20px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 25px; /* space between groups */
}

/* GROUPS */
.group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* BUTTONS */
.tab {
  background: #643545;
  padding: 12px 14px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s ease;
}

.tab:hover {
  background: #db8b9a;
}

/* CONTENT (FIXED: moved left) */
.content {
  flex: 1;
  display: flex;
  justify-content: flex-start;   /* <-- LEFT aligned */
  align-items: flex-start;       /* <-- top aligned instead of center */
  padding: 20px 10px 20px 10px;  /* reduced left padding */
  box-sizing: border-box;
}

/* IFRAME */
iframe {
  width: 90%;
  height: 95%;
  border: none;
  border-radius: 12px;
  background: #391823;
}
</style>
</head>

<body>

<div class="sidebar">

  <!-- Collages -->
  <div class="group">
    <div class="tab" onclick="loadTool('eight.html')">8 Pieces</div>
    <div class="tab" onclick="loadTool('ten.html')">10 Pieces</div>
    <div class="tab" onclick="loadTool('twelve.html')">12 Pieces</div>
  </div>

  <!-- Tools -->
  <div class="group">
    <div class="tab" onclick="loadTool('makeup.html')">Make-Up</div>
    <div class="tab" onclick="loadTool('deep.html')">Deep Echoes</div>
  </div>

  <!-- Utilities -->
  <div class="group">
    <div class="tab" onclick="loadTool('watermark.html')">Watermark</div>
    <div class="tab" onclick="loadTool('flex.html')">Flex</div>
  </div>

  <!-- Tests -->
  <div class="group">
    <div class="tab" onclick="loadTool('test.html')">Test 1</div>
    <div class="tab" onclick="loadTool('test2.html')">Test 2</div>
    <div class="tab" onclick="loadTool('test3.html')">Test 3</div>
  </div>

</div>

<div class="content">
  <iframe id="toolFrame" src="collages/eight.html"></iframe>
</div>

<script>
function loadTool(page) {
  document.getElementById("toolFrame").src = "collages/" + page;
}
</script>

</body>
</html>
