<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Collage Tool</title>

<style>
body {
  margin: 0;
  background: #16161d;
  font-family: Arial;
  color: white;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 900px;
}

.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.tab {
  background: #222838;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.tab:hover {
  background: #4f7cff;
}
</style>
</head>

<body>

<div class="container">
  <h1>Collage Tool</h1>

  <div class="tabs">
    <div class="tab" onclick="go('eight.html')">8 Pieces</div>
    <div class="tab" onclick="go('ten.html')">10 Pieces</div>
    <div class="tab" onclick="go('twelve.html')">12 Pieces</div>
    <div class="tab" onclick="go('makeup.html')">Makeup</div>
    <div class="tab" onclick="go('deep.html')">Deep Echoes</div>
  </div>
</div>

<script>
function go(page) {
  window.location.href = "collages/" + page;
}
</script>

</body>
</html>
