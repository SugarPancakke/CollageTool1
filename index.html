<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Collage Tool</title>

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  color: white;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 900px;
}

h1 {
  margin-bottom: 30px;
}

/* MAIN WRAPPER */
.tabs {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* EACH ROW */
.tab-row {
  display: flex;
  justify-content: left;
  gap: 10px;
}

/* BUTTONS */
.tab {
  background: #643545;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s ease;
  color: white;
}

.tab:hover {
  background: #db8b9a;
}
</style>

</head>

<body>

<div class="container">
  <h1>Collage Tool</h1>

  <div class="tabs">

<div class="tab-row">
  <div class="tab" onclick="go('two.html')">2 Pieces</div>
  <div class="tab" onclick="go('eight.html')">8 Pieces</div>
  <div class="tab" onclick="go('ten.html')">10 Pieces</div>
  <div class="tab" onclick="go('twelve.html')">12 Pieces</div>
</div>

<div class="tab-row">
  <div class="tab" onclick="go('makeup.html')">Make-Up</div>
  <div class="tab" onclick="go('deep.html')">Deep Echoes</div>
</div>

<div class="tab-row">
  <div class="tab" onclick="go('watermark.html')">Watermark</div>
  <div class="tab" onclick="go('flex.html')">Flex</div>
</div>

<div class="tab-row">
  <div class="tab" onclick="go('test.html')">test</div>
  <div class="tab" onclick="go('test2.html')">test2</div>
</div>

  </div>

</div>

<script>
function go(page) {
  window.location.href = "collages/" + page;
}
</script>

</body>
</html>
