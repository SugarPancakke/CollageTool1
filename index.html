<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Collage Tool</title>

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  color: white;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 900px;
}

h1 {
  margin-bottom: 30px;
}

/* GRID SYSTEM (better than manual rows) */
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 18px 12px; /* vertical gap + horizontal gap */
}

/* BUTTONS */
.tab {
  background: #643545;
  padding: 15px 18px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s ease;
  color: white;
  white-space: nowrap;
}

.tab:hover {
  background: #db8b9a;
}

/* optional: nicer alignment feel */
.tab:active {
  transform: scale(0.97);
}
</style>

</head>

<body>

<div class="container">
  <h1>Collage Tool</h1>

  <div class="tabs">

    <!-- main sets -->
    <div class="tab" onclick="go('eight.html')">8 Pieces</div>
    <div class="tab" onclick="go('ten.html')">10 Pieces</div>
    <div class="tab" onclick="go('twelve.html')">12 Pieces</div>

    <!-- styles/tools -->
    <div class="tab" onclick="go('makeup.html')">Make-Up</div>
    <div class="tab" onclick="go('deep.html')">Deep Echoes</div>

    <!-- utilities -->
    <div class="tab" onclick="go('watermark.html')">Watermark</div>
    <div class="tab" onclick="go('flex.html')">Flex</div>

    <!-- tests -->
    <div class="tab" onclick="go('test.html')">Test 1</div>
    <div class="tab" onclick="go('test2.html')">Test 2</div>
    <div class="tab" onclick="go('test3.html')">Test 3</div>

  </div>
</div>

<script>
function go(page) {
  window.location.href = "collages/" + page;
}
</script>

</body>
</html>
