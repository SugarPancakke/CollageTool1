<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Collage Tool</title>

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  color: white;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: #2b1118;
  padding: 20px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 25px;
  overflow: hidden;
}

/* GROUPS */
.group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* BUTTONS */
.tab {
  background: #643545;
  padding: 12px 14px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s ease;
  user-select: none;
}

.tab:hover {
  background: #db8b9a;
}

/* CONTENT AREA = FULL APP VIEWPORT */
.content {
  flex: 1;
  padding: 0;
  margin: 0;
  overflow: hidden;
  display: flex;
}

/* IFRAME = FULL SCREEN CANVAS */
iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
</style>

</head>

<body>

<div class="sidebar">

  <div class="group">
    <div class="tab" onclick="loadTool('eight.html')">8 Pieces</div>
    <div class="tab" onclick="loadTool('ten.html')">10 Pieces</div>
    <div class="tab" onclick="loadTool('twelve.html')">12 Pieces</div>
  </div>

  <div class="group">
    <div class="tab" onclick="loadTool('makeup.html')">Make-Up</div>
    <div class="tab" onclick="loadTool('deep.html')">Deep Echoes</div>
  </div>

  <div class="group">
    <div class="tab" onclick="loadTool('watermark.html')">Watermark</div>
    <div class="tab" onclick="loadTool('flex.html')">Flex</div>
  </div>

</div>

<div class="content">
  <iframe id="toolFrame" src="collages/eight.html"></iframe>
</div>

<script>
function loadTool(page) {
  document.getElementById("toolFrame").src = "collages/" + page;
}
</script>

</body>
</html>
