<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>10 Pieces Collage</title>

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: white;
}

.wrapper {
  position: relative;
}

.container {
  width: 900px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tool {
  background: #643545;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  width: 100%;
  box-sizing: border-box;
}

.controls {
  display: flex;
  gap: 10px;
  align-items: center;
}

.tool > button:first-child {
  margin-top: 10px;
}

h2 {
  margin-bottom: 30px; 
}

.button-group {
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #db8b9a;
  color: white;
  cursor: pointer;
  transition: 0.2s ease;
  font-size: 14px;
}

button:hover {
  background: #c06f7f;
}

canvas {
  display: block;
  transform: scale(0.33);
  transform-origin: center top;
  margin-top: 10px;
}

#parserBox {
  position: absolute;
  left: calc(100% + 20px);
  top: 0;
  width: 240px;
  background: #643545;
  padding: 15px;
  border-radius: 12px;
}

#parserBox .button-group {
  margin-bottom: 12px;
}

.list-item {
  margin-bottom: 5px;
  font-size: 13px;
  line-height: 1.4;
}

#copyStatus {
  font-size: 12px;
  margin-top: 6px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="container">

  <div class="tool">
    <button onclick="goBack()">← Back</button>

    <h2>10 Pieces Collage</h2>

    <div class="controls">
      <input type="file" id="upload" multiple accept="image/*">

      <div class="button-group">
        <button onclick="generate()">Generate</button>
        <button onclick="download()">Download PNG</button>
      </div>
    </div>
  </div>

  <canvas id="canvas" width="1500" height="2100"></canvas>

</div>

<div id="parserBox">
  <h3>Outfit List</h3>

  <div class="button-group">
    <button onclick="copyList()">Copy</button>
    <span id="copyStatus"></span>
  </div>

  <div id="output"></div>
</div>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const mm = 3.78;
const gap = 3 * mm;
const whiteFrame = 4 * mm;

const outerTop = 6.5 * mm;
const outerSide = 6.5 * mm;
const outerBottom = 18.5 * mm;

let images = [];
let bigImage = null;
let usedIDs = [];

const orderedIDs = [
  "H","D","C","T","PP","S","BB",
  "AHE","AHC","AEA","ANE","AHA","AXQ","G","AGL","AFA",
  "AXS","ALE","ABS","AJZ","ARM","ABA","ABK"
];

const idMap = {
  "H":"Hair","D":"Dress","C":"Outerwear","T":"Top",
  "PP":"Bottom","S":"Socks","BB":"Shoes",
  "AHE":"Hair Accessory","AHC":"Headwear","AEA":"Earrings",
  "ANE":"Neckwear","AHA":"Bracelet","AXQ":"Choker",
  "G":"Gloves","AGL":"Face Decoration","AFA":"Face Decoration",
  "AXS":"Chest Accessory","ALE":"Pendant","ABS":"Backpiece",
  "AJZ":"Rings","ARM":"Arm Decoration","ABA":"Handheld","ABK":"Body Paint"
};

const placeholder = new Image();
placeholder.src = "../image/T_showpic_clothes_blank.png";

let placeholderReady = false;
placeholder.onload = () => {
  placeholderReady = true;
  draw();
};

const slotBackground = new Image();
slotBackground.src = "../image/T_showpic_clothes_blank.png";

function goBack() {
  window.location.href = "/CollageTool/";
}

function loadImages(files) {
  return Promise.all([...files].map(file => {
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => res({ img, name: file.name });
        img.src = e.target.result;
      };
      r.readAsDataURL(file);
    });
  }));
}

function drawCover(img, x, y, w, h) {
  const scale = Math.max(w / img.width, h / img.height);
  const sw = w / scale;
  const sh = h / scale;

  const sx = (img.width - sw) / 2;
  const sy = (img.height - sh) / 2;

  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

function safe(img) {
  return img || placeholder;
}

/* ✅ CORRECT LOGIC (matches 8-piece) */
async function generate() {
  const files = document.getElementById("upload").files;
  if (!files.length) return alert("Upload images first");

  const loaded = await loadImages(files);

  let mapped = [];
  let normalImages = [];

  images = [];
  bigImage = null;
  usedIDs = [];

  for (const item of loaded) {
    const name = item.name.toUpperCase();

    if (name.startsWith("T_SHOWPIC_SUIT_")) {
      bigImage = item.img;
      continue;
    }

    let match = name.match(/S\d+([A-Z]+)/);

    if (match) {
      mapped.push({ id: match[1], img: item.img });
    } else {
      normalImages.push(item.img);
    }
  }

  mapped.sort((a, b) =>
    orderedIDs.indexOf(a.id) - orderedIDs.indexOf(b.id)
  );

  // 👇 EXACT same pattern as 8-piece
  const usedMapped = mapped.slice(0, 10);

  images = usedMapped.map(m => m.img);
  usedIDs = usedMapped.map(m => m.id);

  // fill only if needed (same behavior style)
  if (images.length < 10) {
    const needed = 10 - images.length;
    images.push(...normalImages.slice(0, needed));
  }

  // big image from leftovers only
  if (!bigImage && normalImages.length > 0) {
    bigImage = normalImages[normalImages.length - 1];
  }

  draw();
  generateList();
}

function draw() {
  if (!placeholderReady) return;

  const W = canvas.width;
  const H = canvas.height;

  ctx.fillStyle = "#16161d";
  ctx.fillRect(0, 0, W, H);

  const innerX = outerSide;
  const innerY = outerTop;
  const innerW = W - outerSide * 2;
  const innerH = H - outerTop - outerBottom;

  ctx.fillStyle = "white";
  ctx.fillRect(innerX, innerY, innerW, innerH);

  const frameX = innerX + whiteFrame;
  const frameY = innerY + whiteFrame;
  const frameW = innerW - whiteFrame * 2;
  const frameH = innerH - whiteFrame * 2;

  const colW = (frameW - gap * 3) / 4;
  const rowH = (frameH - gap * 3) / 4;

  let i = 0;

  for (let c = 0; c < 4; c++)
    drawCover(safe(images[i++]), frameX + c * (colW + gap), frameY, colW, rowH);

  const y2 = frameY + rowH + gap;
  const y3 = y2 + rowH + gap;
  const y4 = y3 + rowH + gap;

  for (let c = 0; c < 2; c++)
    drawCover(safe(images[i++]), frameX + c * (colW + gap), y2, colW, rowH);

  for (let c = 0; c < 2; c++)
    drawCover(safe(images[i++]), frameX + c * (colW + gap), y3, colW, rowH);

  for (let c = 0; c < 2; c++)
    drawCover(safe(images[i++]), frameX + c * (colW + gap), y4, colW, rowH);

  const bx = frameX + 2 * (colW + gap);
  const by = y2;
  const bw = colW * 2 + gap;
  const bh = rowH * 3 + gap * 2;

  ctx.drawImage(slotBackground, bx, by, bw, bh);
  drawCover(safe(bigImage), bx, by, bw, bh);

  const overlayText = "@eidams_secrets @eidams_secrets";

  ctx.fillStyle = "rgba(255,255,255,0.20)";
  ctx.textAlign = "center";
  ctx.font = "bold 81px Comic Sans MS";

  [
    frameY + 82,
    frameY + rowH + gap + 82,
    frameY + (rowH + gap) * 2 + 82,
    frameY + (rowH + gap) * 3 + 82
  ].forEach(y => {
    ctx.fillText(overlayText, frameX + frameW / 2, y);
  });

  ctx.fillStyle = "rgba(84,84,84,0.75)";
  ctx.font = "bold 40px Comic Sans MS";
  ctx.fillText("@eidams_secrets  @eidams_secrets", W / 2, H - (outerBottom / 2) + 15);
}

function generateList() {
  const result = orderedIDs
    .filter(id => usedIDs.includes(id))
    .map(id => idMap[id]);

  document.getElementById("output").innerHTML =
    result.map(i => `<div class="list-item">• ${i}</div>`).join("");
}

function copyList() {
  const text = document.getElementById("output").innerText;
  if (!text.trim()) return;

  navigator.clipboard.writeText(text).then(() => {
    const status = document.getElementById("copyStatus");
    status.innerText = "Copied!";
    setTimeout(() => status.innerText = "", 1200);
  });
}

function download() {
  const link = document.createElement("a");
  link.download = "collage.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
