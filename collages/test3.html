<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>8 Piece Collage</title>

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: white;
}

.container {
  width: 900px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tool {
  background: #643545;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  width: 100%;
  box-sizing: border-box;
}

.controls {
  display: flex;
  gap: 10px;
  align-items: center;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #db8b9a;
  color: white;
  cursor: pointer;
}

canvas {
  display: block;
  transform: scale(0.43);
  transform-origin: center top;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="tool">
    <h2>8 Pieces Collage</h2>

    <div class="controls">
      <input type="file" id="upload" multiple accept="image/*">
      <button onclick="generate()">Generate</button>
      <button onclick="download()">Download PNG</button>
    </div>

  </div>

<canvas id="canvas" width="1450" height="1510"></canvas>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const mm = 3.78;
const gap = 2.5 * mm;
const whiteFrame = 3.5 * mm;

const outerTop = 6 * mm;
const outerSide = 6 * mm;
const outerBottom = 18 * mm;

let images = [];
let imageIDs = []; // 🔥 store IDs for debug
let bigImage = null;

const placeholder = new Image();
placeholder.src = "../image/T_showpic_clothes_blank.png";

let placeholderReady = false;
placeholder.onload = () => {
  placeholderReady = true;
  draw();
};

/* =======================
   ID SYSTEM
======================= */
const orderedIDs = [
  "H","D","C","T","PP","S","BB",
  "AHE","AHC","AEA","ANE","AHA","AXQ","G","AGL","AFA",
  "AXS","ALE","ABS","AJZ","ARM","ABA","ABK"
];

const detectionIDs = [...orderedIDs].sort((a,b) => b.length - a.length);

function getID(name) {
  name = name.toUpperCase().split(".")[0];
  let parts = name.split("_");

  for (let i = parts.length - 1; i >= 0; i--) {
    let clean = parts[i].replace(/[0-9]/g, "");

    for (let id of detectionIDs) {
      if (clean === id || clean.endsWith(id)) {
        return id;
      }
    }
  }
  return null;
}
/* ======================= */

function loadImages(files) {
  return Promise.all([...files].map(file => {
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => res({ img, name: file.name });
        img.src = e.target.result;
      };
      r.readAsDataURL(file);
    });
  }));
}

/* =======================
   GENERATE
======================= */
async function generate() {
  const files = document.getElementById("upload").files;
  if (!files.length) return alert("Upload images first");

  const loaded = await loadImages(files);

  let normalImages = [];

  for (const item of loaded) {
    const id = getID(item.name);

    if (!id) {
      console.warn("No ID:", item.name);
    }

    normalImages.push({ img: item.img, id });
  }

  // 🔥 SORT CORRECTLY
  normalImages.sort((a, b) => {
    const ai = orderedIDs.indexOf(a.id);
    const bi = orderedIDs.indexOf(b.id);
    return (ai === -1 ? Infinity : ai) - (bi === -1 ? Infinity : bi);
  });

  // 🔥 KEEP ORDER
  images = normalImages.map(i => i.img);
  imageIDs = normalImages.map(i => i.id);

  // 🔥 DO NOT REMOVE FIRST ITEM
  bigImage = images[0] || null;

  draw();
}

/* =======================
   DRAW
======================= */
function draw() {
  if (!placeholderReady) return;

  const W = canvas.width;
  const H = canvas.height;

  ctx.fillStyle = "#16161d";
  ctx.fillRect(0, 0, W, H);

  const innerX = outerSide;
  const innerY = outerTop;
  const innerW = W - outerSide * 2;
  const innerH = H - outerTop - outerBottom;

  ctx.fillStyle = "white";
  ctx.fillRect(innerX, innerY, innerW, innerH);

  const frameX = innerX + whiteFrame;
  const frameY = innerY + whiteFrame;
  const frameW = innerW - whiteFrame * 2;
  const frameH = innerH - whiteFrame * 2;

  const colW = (frameW - gap * 3) / 4;
  const rowH = (frameH - gap * 2) / 3;

  let i = 0;

  function drawSlot(img, id, x, y, w, h) {
    drawCover(img || placeholder, x, y, w, h);

    // 🔥 DEBUG LABEL
    if (id) {
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(x, y, 60, 28);

      ctx.fillStyle = "white";
      ctx.font = "bold 18px Arial";
      ctx.fillText(id, x + 6, y + 20);
    }
  }

  // Top row
  for (let c = 0; c < 4; c++) {
    drawSlot(images[i], imageIDs[i], frameX + c * (colW + gap), frameY, colW, rowH);
    i++;
  }

  const y2 = frameY + rowH + gap;
  const y3 = y2 + rowH + gap;

  // middle left
  for (let c = 0; c < 2; c++) {
    drawSlot(images[i], imageIDs[i], frameX + c * (colW + gap), y2, colW, rowH);
    i++;
  }

  // bottom left
  for (let c = 0; c < 2; c++) {
    drawSlot(images[i], imageIDs[i], frameX + c * (colW + gap), y3, colW, rowH);
    i++;
  }

  // big image
  const bx = frameX + 2 * (colW + gap);
  const by = y2;
  const bw = colW * 2 + gap;
  const bh = rowH * 2 + gap;

  drawCover(bigImage || placeholder, bx, by, bw, bh);
}

function drawCover(img, x, y, w, h) {
  const scale = Math.max(w / img.width, h / img.height);
  const sw = w / scale;
  const sh = h / scale;

  const sx = (img.width - sw) / 2;
  const sy = (img.height - sh) / 2;

  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

function download() {
  const link = document.createElement("a");
  link.download = "collage.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
