<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>List Diff Tool</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    textarea {
      width: 70%;
      height: 200px;
      margin-right: 10px;
    }
    .container {
      display: flex;
      gap: 20px;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
    }
    .results {
      margin-top: 20px;
      display: flex;
      gap: 50px;
    }
    ul {
      background: #f5f5f5;
      padding: 10px;
      min-width: 200px;
    }
  </style>
</head>
<body>

<h2>List Comparison Tool</h2>

<div class="container">
  <div>
    <h3>Original List</h3>
    <textarea id="list1" placeholder="One item per line"></textarea>
  </div>
  <div>
    <h3>New List</h3>
    <textarea id="list2" placeholder="One item per line"></textarea>
  </div>
</div>

<button onclick="compareLists()">Compare</button>

<div class="results">
  <div>
    <h3>Added</h3>
    <ul id="added"></ul>
  </div>
  <div>
    <h3>Removed</h3>
    <ul id="removed"></ul>
  </div>
</div>

<script>
function compareLists() {
  const list1 = document.getElementById("list1").value
    .split("\n")
    .map(x => x.trim())
    .filter(x => x !== "");

  const list2 = document.getElementById("list2").value
    .split("\n")
    .map(x => x.trim())
    .filter(x => x !== "");

  const set1 = new Set(list1);
  const set2 = new Set(list2);

  const added = list2.filter(item => !set1.has(item));
  const removed = list1.filter(item => !set2.has(item));

  const addedList = document.getElementById("added");
  const removedList = document.getElementById("removed");

  addedList.innerHTML = "";
  removedList.innerHTML = "";

  added.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;
    addedList.appendChild(li);
  });

  removed.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;
    removedList.appendChild(li);
  });
}
</script>

</body>
</html>
