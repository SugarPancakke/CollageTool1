<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Text Diff Tool</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    textarea {
      width: 100%;
      height: 120px;
      margin-bottom: 10px;
      padding: 10px;
      font-family: monospace;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    .result {
      margin-top: 20px;
      padding: 10px;
      background: white;
      border-radius: 5px;
    }
    .added {
      background-color: #d4f8d4;
    }
    .removed {
      background-color: #f8d4d4;
      text-decoration: line-through;
    }
  </style>
</head>
<body>
  <h2>Text Difference Tool</h2>

  <label>Original Text:</label>
  <textarea id="text1"></textarea>

  <label>Modified Text:</label>
  <textarea id="text2"></textarea>

  <button onclick="compareText()">Compare</button>

  <div class="result" id="output"></div>

  <script>
    function compareText() {
      const text1 = document.getElementById('text1').value.split(/(\s+)/);
      const text2 = document.getElementById('text2').value.split(/(\s+)/);

      const dp = Array(text1.length + 1).fill(null).map(() => Array(text2.length + 1).fill(0));

      for (let i = 1; i <= text1.length; i++) {
        for (let j = 1; j <= text2.length; j++) {
          if (text1[i - 1] === text2[j - 1]) {
            dp[i][j] = dp[i - 1][j - 1] + 1;
          } else {
            dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
          }
        }
      }

      let i = text1.length;
      let j = text2.length;
      let result = [];

      while (i > 0 && j > 0) {
        if (text1[i - 1] === text2[j - 1]) {
          result.unshift(text1[i - 1]);
          i--;
          j--;
        } else if (dp[i - 1][j] > dp[i][j - 1]) {
          result.unshift(`<span class="removed">${text1[i - 1]}</span>`);
          i--;
        } else {
          result.unshift(`<span class="added">${text2[j - 1]}</span>`);
          j--;
        }
      }

      while (i > 0) {
        result.unshift(`<span class="removed">${text1[i - 1]}</span>`);
        i--;
      }

      while (j > 0) {
        result.unshift(`<span class="added">${text2[j - 1]}</span>`);
        j--;
      }

      document.getElementById('output').innerHTML = result.join('');
    }
  </script>
</body>
</html>
