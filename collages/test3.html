<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>12 Pieces Collage</title>

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: white;
}

.wrapper { position: relative; }

.container {
  width: 900px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tool {
  background: #643545;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  width: 100%;
}

h2 { margin-bottom: 20px; }

.controls {
  display: flex;
  gap: 10px;
  align-items: center;
}

.button-group { display: flex; gap: 10px; }

button {
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #db8b9a;
  color: white;
  cursor: pointer;
}

button:hover { background: #c06f7f; }

canvas {
  display: block;
  transform: scale(0.33);
  transform-origin: center top;
}

#parserBox {
  position: absolute;
  left: calc(100% + 20px);
  top: 0;
  width: 240px;
  background: #643545;
  padding: 15px;
  border-radius: 12px;
}

.list-item { margin-bottom: 5px; font-size: 13px; }
</style>
</head>

<body>

<div class="wrapper">

<div class="container">

  <div class="tool">
    <h2>12 Pieces Collage</h2>

    <div class="controls">
      <input type="file" id="upload" multiple>
      <div class="button-group">
        <button onclick="generate()">Generate</button>
        <button onclick="download()">Download PNG</button>
      </div>
    </div>
  </div>

  <canvas id="canvas" width="1500" height="2100"></canvas>

</div>

<div id="parserBox">
  <h3>Outfit List</h3>
  <button onclick="copyList()">Copy</button>
  <div id="output"></div>
</div>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let images = [];
let bigImage = null;
let usedIDs = [];

const orderedIDs = [
  "H","D","C","T","PP","S","BB",
  "AHE","AHC","AEA","ANE","AHA","AXQ","G","AGL","AFA",
  "AXS","ALE","ABS","AJZ","ARM","ABA","ABK"
];

const idMap = {
  "H":"Hair","D":"Dress","C":"Outerwear","T":"Top",
  "PP":"Bottom","S":"Socks","BB":"Shoes",
  "AHE":"Hair Accessory","AHC":"Headwear","AEA":"Earrings",
  "ANE":"Neckwear","AHA":"Bracelet","AXQ":"Choker",
  "G":"Gloves","AGL":"Face Decoration","AFA":"Face Decoration",
  "AXS":"Chest Accessory","ALE":"Pendant","ABS":"Backpiece",
  "AJZ":"Rings","ARM":"Arm Decoration","ABA":"Handheld","ABK":"Body Paint"
};

function loadImages(files) {
  return Promise.all([...files].map(file => {
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => res({ img, name: file.name });
        img.src = e.target.result;
      };
      r.readAsDataURL(file);
    });
  }));
}

/* ✅ TRUE 12-SLOT GENERATE */
async function generate() {
  const files = document.getElementById("upload").files;
  if (!files.length) return;

  const loaded = await loadImages(files);

  let mapped = [];
  let normal = [];

  for (const item of loaded) {
    const name = item.name.toUpperCase();

    if (name.startsWith("T_SHOWPIC_SUIT_")) {
      bigImage = item.img;
      continue;
    }

    const match = name.match(/S\d+([A-Z]+)/);

    if (match) mapped.push({ id: match[1], img: item.img });
    else normal.push(item.img);
  }

  mapped.sort((a, b) =>
    orderedIDs.indexOf(a.id) - orderedIDs.indexOf(b.id)
  );

  const combined = [
    ...mapped.map(m => ({ id: m.id, img: m.img })),
    ...normal.map(n => ({ id: null, img: n }))
  ];

  /* EXACT 12 slots */
  while (combined.length < 12) {
    combined.push(combined[combined.length - 1]);
  }

  images = combined.slice(0, 12).map(i => i.img);
  usedIDs = combined.slice(0, 12).filter(i => i.id).map(i => i.id);

  if (!bigImage && combined.length > 0) {
    bigImage = combined[combined.length - 1].img;
  }

  draw();
  generateList();
}

/* DRAW TRUE GRID */
function draw() {
  const W = canvas.width;
  const H = canvas.height;

  ctx.fillStyle = "#16161d";
  ctx.fillRect(0, 0, W, H);

  const cols = 4;
  const rows = 3;

  const gap = 20;
  const margin = 80;

  const cellW = (W - margin * 2 - gap * (cols - 1)) / cols;
  const cellH = cellW;

  let i = 0;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = margin + c * (cellW + gap);
      const y = margin + r * (cellH + gap);

      const img = images[i++];
      if (!img) continue;

      ctx.drawImage(img, x, y, cellW, cellH);
    }
  }

  /* BIG IMAGE BELOW */
  if (bigImage) {
    const bw = cellW * 2 + gap;
    const bh = bw;
    const bx = (W - bw) / 2;
    const by = margin + rows * (cellH + gap) + 40;

    ctx.drawImage(bigImage, bx, by, bw, bh);
  }
}

/* LIST */
function generateList() {
  const result = orderedIDs
    .filter(id => usedIDs.includes(id))
    .map(id => idMap[id]);

  document.getElementById("output").innerHTML =
    result.map(i => `<div class="list-item">• ${i}</div>`).join("");
}

function copyList() {
  navigator.clipboard.writeText(
    document.getElementById("output").innerText
  );
}

function download() {
  const link = document.createElement("a");
  link.download = "collage.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
