<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>12 Pieces Collage</title>

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: white;
}

.container {
  width: 900px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tool {
  background: #643545;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  width: 100%;
  box-sizing: border-box;
}

button {
  margin-top: 10px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #db8b9a;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #c06f7f;
}

canvas {
  display: block;
  transform: scale(0.4);
  transform-origin: center top;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="tool">
    <button onclick="goBack()">← Back</button>

    <h2>Collage Tool</h2>

    <input type="file" id="upload" multiple accept="image/*">

    <button onclick="generate()">Generate</button>
    <button onclick="download()">Download PNG</button>
  </div>

  <canvas id="canvas" width="1500" height="2100"></canvas>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const mm = 3.78;
const gap = 2.5 * mm;
const whiteFrame = 3.5 * mm;

const outerTop = 6 * mm;
const outerSide = 6 * mm;
const outerBottom = 18 * mm;

let images = [];
let bigImage = null;

/* Placeholder (NO blocking logic anymore) */
const placeholder = new Image();
placeholder.src = "../image/T_showpic_clothes_blank.png";

/* Big slot background */
const slotBackground = new Image();
slotBackground.src = "../image/T_showpic_clothes_blank.png";

/* BACK */
function goBack() {
  window.location.href = "/CollageTool/";
}

/* LOAD IMAGES */
function loadImages(files) {
  return Promise.all([...files].map(file => {
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => res({ img, name: file.name });
        img.src = e.target.result;
      };
      r.readAsDataURL(file);
    });
  }));
}

/* COVER DRAW */
function drawCover(img, x, y, w, h) {
  const safeImg = img || placeholder;

  const scale = Math.max(w / safeImg.width, h / safeImg.height);
  const sw = w / scale;
  const sh = h / scale;

  const sx = (safeImg.width - sw) / 2;
  const sy = (safeImg.height - sh) / 2;

  ctx.drawImage(safeImg, sx, sy, sw, sh, x, y, w, h);
}

/* SAFE */
function safe(img) {
  return img || placeholder;
}

/* GENERATE */
async function generate() {
  const files = document.getElementById("upload").files;
  if (!files.length) return alert("Upload images first");

  const loaded = await loadImages(files);

  images = [];
  bigImage = null;

  let normalImages = [];

  for (const item of loaded) {
    if (item.name.startsWith("T_showpic_suit_")) {
      bigImage = item.img;
    } else {
      normalImages.push(item.img);
    }
  }

  if (!bigImage && normalImages.length > 0) {
    bigImage = normalImages.shift();
  }

  images = normalImages;

  draw();
}

/* DRAW */
function draw() {
  const W = canvas.width;
  const H = canvas.height;

  ctx.fillStyle = "#16161d";
  ctx.fillRect(0, 0, W, H);

  const innerX = outerSide;
  const innerY = outerTop;
  const innerW = W - outerSide * 2;
  const innerH = H - outerTop - outerBottom;

  ctx.fillStyle = "white";
  ctx.fillRect(innerX, innerY, innerW, innerH);

  const frameX = innerX + whiteFrame;
  const frameW = innerW - whiteFrame * 2;
  const frameH = innerH - whiteFrame * 2;

  const colW = (frameW - gap * 3) / 4;
  const rowH = (frameH - gap * 3) / 4;

  const stepY = rowH + gap;

  const y1 = innerY + whiteFrame;
  const y2 = y1 + stepY;
  const y3 = y2 + stepY;
  const y4 = y3 + stepY;

  let i = 0;

  /* ROW 1 */
  for (let c = 0; c < 4; c++) {
    drawCover(images[i++], frameX + c * (colW + gap), y1, colW, rowH);
  }

  /* ROW 2 */
  for (let c = 0; c < 4; c++) {
    drawCover(images[i++], frameX + c * (colW + gap), y2, colW, rowH);
  }

  /* ROW 3 LEFT */
  for (let c = 0; c < 2; c++) {
    drawCover(images[i++], frameX + c * (colW + gap), y3, colW, rowH);
  }

  /* BIG SLOT */
  const bx = frameX + 2 * (colW + gap);
  const by = y3;
  const bw = colW * 2 + gap;
  const bh = rowH * 2 + gap;

  if (slotBackground.complete) {
    ctx.drawImage(slotBackground, bx, by, bw, bh);
  }

  drawCover(bigImage, bx, by, bw, bh);

  i += 2;

  /* ROW 4 */
  for (let c = 0; c < 4; c++) {
    drawCover(images[i++], frameX + c * (colW + gap), y4, colW, rowH);
  }

  /* TEXT */
  ctx.fillStyle = "rgba(84,84,84,0.75)";
  ctx.font = "bold 40px Comic Sans MS";

  const text = "@eidams_secrets  @eidams_secrets  @eidams_secrets";
  const tw = ctx.measureText(text).width;

  ctx.fillText(text, (W - tw) / 2, H - (outerBottom / 2) + 15);
}

/* DOWNLOAD */
function download() {
  const link = document.createElement("a");
  link.download = "collage.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

/* INITIAL DRAW (important for CI) */
draw();
</script>

</body>
</html>
