<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>10 Pieces Collage</title>

<style>
body {
  margin: 0;
  background: #391823;
  display: flex;
  justify-content: center;
  padding: 20px;
  font-family: Arial;
  color: white;
}

.container {
  width: 900px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tool {
  background: #643545;
  padding: 15px;
  border-radius: 12px;
  width: 100%;
  margin-bottom: 15px;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #db8b9a;
  color: white;
  cursor: pointer;
}

canvas {
  transform: scale(0.4);
  transform-origin: top center;
  display: block;
}
</style>
</head>

<body>

<div class="container">

  <div class="tool">
    <h2>10 Pieces Collage</h2>
    <input type="file" id="upload" multiple accept="image/*">
    <button onclick="generate()">Generate</button>
    <button onclick="download()">Download</button>
  </div>

  <canvas id="canvas" width="1500" height="2100"></canvas>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

/* ===== SETTINGS ===== */
const gap = 24;
const framePad = 20;
const radius = 8;

/* ===== STATE ===== */
let imgs = [];
let big = null;

/* ===== LOAD ===== */
function load(files) {
  return Promise.all([...files].map(f =>
    new Promise(res => {
      const r = new FileReader();
      r.onload = e => {
        const i = new Image();
        i.onload = () => res(i);
        i.src = e.target.result;
      };
      r.readAsDataURL(f);
    })
  ));
}

/* ===== ROUND RECT ===== */
function round(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* ===== COVER DRAW (NO STRETCH) ===== */
function draw(img,x,y,w,h){
  ctx.save();
  round(x,y,w,h,radius);
  ctx.clip();

  const s = Math.max(w/img.width, h/img.height);
  const sw = w/s;
  const sh = h/s;

  const sx = (img.width - sw)/2;
  const sy = (img.height - sh)/2;

  ctx.drawImage(img, sx,sy,sw,sh, x,y,w,h);
  ctx.restore();
}

/* ===== GENERATE ===== */
async function generate(){
  const files = document.getElementById("upload").files;
  if(!files.length) return alert("Upload images");

  const loaded = await load(files);

  imgs = [];
  big = null;

  let normal = [];

  loaded.forEach((img,i)=>{
    if(i===0) big = img; else normal.push(img);
  });

  imgs = normal;
  drawAll();
}

/* ===== DRAW ===== */
function drawAll(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const W = canvas.width;
  const H = canvas.height;

  ctx.fillStyle = "#16161d";
  ctx.fillRect(0,0,W,H);

  const x = framePad;
  const y = framePad;
  const w = W - framePad*2;
  const h = H - framePad*2;

  /* FRAME */
  ctx.fillStyle = "white";
  round(x,y,w,h,radius);
  ctx.fill();

  const fx = x + 20;
  const fy = y + 20;
  const fw = w - 40;
  const fh = h - 40;

  const col = (fw - gap*3)/4;
  const row = (fh - gap*3)/4;

  let i = 0;

  /* ROWS */
  for(let r=0;r<4;r++){
    for(let c=0;c< (r===0?4:2);c++){
      if(r===1 && c===1) continue;
      if(r===2 && c===1) continue;
      if(r===3 && c===1) continue;

      if(i<imgs.length){
        draw(imgs[i++], fx + c*(col+gap), fy + r*(row+gap), col, row);
      }
    }
  }

  /* SLOT 9 BIG */
  const bx = fx + 2*(col+gap);
  const by = fy + (row+gap);
  const bw = col*2 + gap;
  const bh = row*3 + gap*2;

  if(big){
    draw(big, bx,by,bw,bh);
  }

  /* WATERMARK */
  ctx.fillStyle = "rgba(84,84,84,0.75)";
  ctx.font = "bold 40px Arial";

  const text = "@eidams_secrets  @eidams_secrets  @eidams_secrets";
  const tw = ctx.measureText(text).width;

  ctx.fillText(text, (W-tw)/2, H-30);
}

/* ===== DOWNLOAD ===== */
function download(){
  const a = document.createElement("a");
  a.download = "collage.png";
  a.href = canvas.toDataURL();
  a.click();
}
</script>

</body>
</html>
