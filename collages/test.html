<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Batch Watermark Tool</title>

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: white;
}

.container {
  width: 1000px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tool {
  background: #643545;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  width: 100%;
  box-sizing: border-box;
}

button {
  margin-top: 10px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #db8b9a;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #c06f7f;
}

/* PREVIEW LAYOUT (HEIGHT-BASED) */
#preview {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
}

#preview canvas {
  height: 300px;   /* fixed height */
  width: auto;     /* auto width */
  max-width: 100%;
  border-radius: 8px;
}
</style>

<!-- JSZip -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>

<body>

<div class="container">

  <div class="tool">
    <h2>Batch Watermark Tool</h2>

<input type="file" id="upload" multiple accept="image/*">

<button onclick="generate()">Generate Preview</button>
<button onclick="download()">Download All (ZIP)</button>

  </div>

  <div id="preview"></div>

</div>

<script>
let images = [];

/* LOAD IMAGES */
function loadImages(files) {
  return Promise.all([...files].map(file => {
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => res(img);
        img.src = e.target.result;
      };
      r.readAsDataURL(file);
    });
  }));
}

/* DRAW WATERMARK (CLEAN) */
function drawWatermarked(ctx, img, W, H) {

  // draw original image
  ctx.drawImage(img, 0, 0, W, H);

  const text = "@eidams_secrets  @eidams_secrets  @eidams_secrets";

  const fontSize = H * 0.08;

  ctx.fillStyle = "rgba(255,255,255,0.35)";
  ctx.textAlign = "center";
  ctx.font = `bold ${fontSize}px Comic Sans MS`;

  // TOP
  ctx.fillText(text, W / 2, H * 0.08);

  // BOTTOM
  ctx.fillText(text, W / 2, H * 0.97);
}

/* GENERATE PREVIEWS */
async function generate() {
  const files = document.getElementById("upload").files;
  if (!files.length) return alert("Upload images first");

  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  images = await loadImages(files);

  for (let i = 0; i < images.length; i++) {
    const img = images[i];

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    // 🔥 fixed height, auto width
    const previewHeight = 500;

    canvas.height = previewHeight;
    canvas.width = img.width * (previewHeight / img.height);

    drawWatermarked(ctx, img, canvas.width, canvas.height);

    preview.appendChild(canvas);
  }
}

/* DOWNLOAD ZIP */
async function download() {
  const files = document.getElementById("upload").files;
  if (!files.length) return alert("Upload images first");

  const imgs = await loadImages(files);
  const zip = new JSZip();

  for (let i = 0; i < imgs.length; i++) {
    const img = imgs[i];

    const canvas = document.createElement("canvas");
    canvas.width = img.width;
    canvas.height = img.height;

    const ctx = canvas.getContext("2d");

    drawWatermarked(ctx, img, canvas.width, canvas.height);

    const base64 = canvas.toDataURL("image/png").split(",")[1];

    zip.file(`watermarked_${i + 1}.png`, base64, { base64: true });
  }

  const blob = await zip.generateAsync({ type: "blob" });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "watermarked_images.zip";
  link.click();
}
</script>

</body>
</html>
