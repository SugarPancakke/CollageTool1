<!DOCTYPE html>
<html>
<body style="background:#222;color:white;text-align:center">

<h2>Video Watermark (Browser Only)</h2>

<input type="file" id="file"><br><br>
<button onclick="start()">Start</button><br><br>

<video id="video" controls style="max-width:400px"></video>
<canvas id="canvas" style="display:none"></canvas>

<script>
async function start(){
  const file = document.getElementById("file").files[0];
  if(!file) return alert("Upload video");

  const video = document.getElementById("video");
  video.src = URL.createObjectURL(file);

  await video.play();

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const stream = canvas.captureStream();
  const recorder = new MediaRecorder(stream);

  let chunks = [];
  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "watermarked.webm";
    a.click();
  };

  recorder.start();

  function draw(){
    ctx.drawImage(video,0,0);

    // WATERMARK
    ctx.fillStyle = "rgba(255,255,255,0.2)";
    ctx.font = "40px Arial";
    ctx.textAlign = "center";
    ctx.fillText("@eidams_secrets", canvas.width/2, canvas.height*0.9);

    if(!video.ended){
      requestAnimationFrame(draw);
    } else {
      recorder.stop();
    }
  }

  draw();
}
</script>

</body>
</html>
