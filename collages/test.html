<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Batch Watermark Tool</title>

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: white;
}

.container {
  width: 900px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tool {
  background: #643545;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  width: 100%;
  box-sizing: border-box;
}

button {
  margin-top: 10px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #db8b9a;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #c06f7f;
}

/* PREVIEW GRID */
#preview {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 10px;
  width: 100%;
}

#preview canvas {
  width: 100%;
  border-radius: 8px;
}
</style>

<!-- JSZip -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>

<body>

<div class="container">

  <div class="tool">
    <h2>Batch Watermark Tool</h2>

```
<input type="file" id="upload" multiple accept="image/*">

<br>

<button onclick="generate()">Generate Preview</button>
<button onclick="download()">Download All (ZIP)</button>
```

  </div>

  <div id="preview"></div>

</div>

<script>
let images = [];

/* LOAD IMAGES */
function loadImages(files) {
  return Promise.all([...files].map(file => {
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => res(img);
        img.src = e.target.result;
      };
      r.readAsDataURL(file);
    });
  }));
}

function drawWatermarked(ctx, img, W, H) {

  // draw image FULL (no frame, no background)
  ctx.drawImage(img, 0, 0, W, H);

  /* WATERMARK */
  const text = "@eidams_secrets   @eidams_secrets   @eidams_secrets";

  const fontSize = H * 0.075;

  ctx.fillStyle = "rgba(255,255,255,0.35)";
  ctx.textAlign = "center";
  ctx.font = `bold ${fontSize}px Comic Sans MS`;

  // TOP (same visual feel as before)
  ctx.fillText(
    text,
    W / 2,
    H * 0.08
  );

  // BOTTOM
  ctx.fillText(
    text,
    W / 2,
    H * 0.97
  );
}

/* GENERATE ALL PREVIEWS */
async function generate() {
  const files = document.getElementById("upload").files;
  if (!files.length) return alert("Upload images first");

  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  images = await loadImages(files);

  for (let i = 0; i < images.length; i++) {
    const img = images[i];

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    // scale preview (keep aspect ratio)
    const maxSize = 500;
    let scale = Math.min(maxSize / img.width, maxSize / img.height, 1);

    canvas.width = img.width * scale;
    canvas.height = img.height * scale;

    drawWatermarked(ctx, img, canvas.width, canvas.height);

    preview.appendChild(canvas);
  }
}

/* DOWNLOAD ZIP (FULL RESOLUTION) */
async function download() {
  const files = document.getElementById("upload").files;
  if (!files.length) return alert("Upload images first");

  const imgs = await loadImages(files);
  const zip = new JSZip();

  for (let i = 0; i < imgs.length; i++) {
    const img = imgs[i];

    const canvas = document.createElement("canvas");
    canvas.width = img.width;
    canvas.height = img.height;

    const ctx = canvas.getContext("2d");

    drawWatermarked(ctx, img, canvas.width, canvas.height);

    const base64 = canvas.toDataURL("image/png").split(",")[1];

    zip.file(`watermarked_${i + 1}.png`, base64, { base64: true });
  }

  const blob = await zip.generateAsync({ type: "blob" });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "watermarked_images.zip";
  link.click();
}
</script>

</body>
</html>
