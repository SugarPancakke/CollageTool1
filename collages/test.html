<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Batch Watermark Tool</title>

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: white;
}

.container {
  width: 900px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tool {
  background: #643545;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  width: 100%;
  box-sizing: border-box;
}

button {
  margin-top: 10px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #db8b9a;
  color: white;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  background: #c06f7f;
}

canvas {
  display: block;
  transform: scale(0.35);
  transform-origin: center top;
  margin-top: 10px;
}
</style>

<!-- JSZip -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>

<body>

<div class="container">

  <div class="tool">
    <h2>Batch Watermark Tool</h2>

```
<input type="file" id="upload" multiple accept="image/*">

<br>

<button onclick="generate()">Preview First Image</button>
<button onclick="download()">Download All (ZIP)</button>
```

  </div>

<canvas id="canvas"></canvas>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let images = [];

/* LOAD IMAGES */
function loadImages(files) {
  return Promise.all([...files].map(file => {
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => res(img);
        img.src = e.target.result;
      };
      r.readAsDataURL(file);
    });
  }));
}

/* DRAW WATERMARKED IMAGE */
function drawWatermarked(ctx, img, W, H) {

  // background
  ctx.fillStyle = "#16161d";
  ctx.fillRect(0, 0, W, H);

  // cover fit
  const scale = Math.max(W / img.width, H / img.height);
  const sw = W / scale;
  const sh = H / scale;

  const sx = (img.width - sw) / 2;
  const sy = (img.height - sh) / 2;

  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, W, H);

  /* WATERMARK */
  const text = "@eidams_secrets  @eidams_secrets";

  const fontSize = H * 0.075; // responsive
  const offset = H * 0.06;

  ctx.fillStyle = "rgba(255,255,255,0.35)";
  ctx.textAlign = "center";
  ctx.font = `bold ${fontSize}px Comic Sans MS`;

  // TOP
  ctx.fillText(text, W / 2, offset);

  // BOTTOM
  ctx.fillText(text, W / 2, H - offset);
}

/* PREVIEW FIRST IMAGE */
async function generate() {
  const files = document.getElementById("upload").files;
  if (!files.length) return alert("Upload images first");

  images = await loadImages(files);

  const img = images[0];

  canvas.width = img.width;
  canvas.height = img.height;

  drawWatermarked(ctx, img, canvas.width, canvas.height);
}

/* DOWNLOAD ALL AS ZIP */
async function download() {
  const files = document.getElementById("upload").files;
  if (!files.length) return alert("Upload images first");

  const imgs = await loadImages(files);

  const zip = new JSZip();

  for (let i = 0; i < imgs.length; i++) {

    const img = imgs[i];

    const tempCanvas = document.createElement("canvas");
    tempCanvas.width = img.width;
    tempCanvas.height = img.height;

    const tctx = tempCanvas.getContext("2d");

    drawWatermarked(tctx, img, tempCanvas.width, tempCanvas.height);

    const base64 = tempCanvas.toDataURL("image/png").split(",")[1];

    zip.file(`watermarked_${i + 1}.png`, base64, { base64: true });
  }

  const blob = await zip.generateAsync({ type: "blob" });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "watermarked_images.zip";
  link.click();
}
</script>

</body>
</html>
