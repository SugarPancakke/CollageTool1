<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>2 Piece Collage</title>

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: white;
}

.container {
  width: 900px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tool {
  background: #643545;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  width: 100%;
  box-sizing: border-box;
}

button {
  margin-top: 10px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #db8b9a;
  color: white;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  background: #c06f7f;
}

canvas {
  display: block;
  transform: scale(0.6);
  transform-origin: center top;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

  <div class="tool">
    <button onclick="goBack()">← Back</button>
    <h2>2 Pieces Collage</h2>
    <input type="file" id="upload" multiple accept="image/*">
    <button onclick="generate()">Generate</button>
    <button onclick="download()">Download PNG</button>
  </div>

<canvas id="canvas" width="1200" height="800"></canvas>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let images = [];

const placeholder = new Image();
placeholder.src = "../image/T_showpic_clothes_blank.png";

let placeholderReady = false;
placeholder.onload = () => {
  placeholderReady = true;
  draw();
};

function goBack() {
  window.location.href = "/CollageTool/";
}

function loadImages(files) {
  return Promise.all([...files].map(file => {
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => res(img);
        img.src = e.target.result;
      };
      r.readAsDataURL(file);
    });
  }));
}

function drawCover(img, x, y, w, h) {
  const scale = Math.max(w / img.width, h / img.height);
  const sw = w / scale;
  const sh = h / scale;

  const sx = (img.width - sw) / 2;
  const sy = (img.height - sh) / 2;

  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

function safe(img) {
  return img ? img : placeholder;
}

async function generate() {
  const files = document.getElementById("upload").files;
  if (!files.length) return alert("Upload images first");

  images = await loadImages(files);
  draw();
}

function draw() {
  if (!placeholderReady) return;

  const W = canvas.width;
  const H = canvas.height;

  ctx.fillStyle = "#16161d";
  ctx.fillRect(0, 0, W, H);

  const gap = 20;

  const imgW = (W - gap * 3) / 2;
  const imgH = H - gap * 2;

  // left image
  drawCover(safe(images[0]), gap, gap, imgW, imgH);

  // right image
  drawCover(safe(images[1]), gap * 2 + imgW, gap, imgW, imgH);

  // watermark
  ctx.fillStyle = "rgba(255,255,255,0.3)";
  ctx.font = "bold 50px Arial";
  ctx.textAlign = "center";
  ctx.fillText("@eidams_secrets", W / 2, H - 30);
}

function download() {
  const link = document.createElement("a");
  link.download = "collage.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
