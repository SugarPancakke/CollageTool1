<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Batch Watermark Tool</title>

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: white;
}

.container {
  width: 1000px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tool {
  background: #643545;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  width: 100%;
  box-sizing: border-box;
}

.controls {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #db8b9a;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #c06f7f;
}

/* 🎨 FIXED DROPDOWN */
select {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;

  background-color: #db8b9a;
  color: white;

  font-weight: bold;
  cursor: pointer;

  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;

  transition: none;

  /* custom arrow */
  background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 8px center;
  background-size: 16px;
  padding-right: 30px;
}

select:hover {
  background-color: #c06f7f;
}

select:focus {
  outline: none;
  box-shadow: none;
}

/* 🔥 dropdown options */
select option {
  background-color: #c06f7f;
  color: white;
}

/* PREVIEW */
#preview {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
}

#preview canvas {
  height: 300px;
  width: auto;
  max-width: 100%;
  border-radius: 8px;
  cursor: pointer;
}

#preview canvas:hover {
  opacity: 0.85;
  transform: scale(1.02);
  transition: 0.2s;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>

<body>

<div class="container">

  <div class="tool">
    <h2>Batch Watermark Tool</h2>

<div class="controls">
  <input type="file" id="upload" multiple accept="image/*">

  <select id="mode">
    <option value="2">2 Lines</option>
    <option value="3">3 Lines</option>
  </select>

  <select id="color">
    <option value="white">White</option>
    <option value="dark">Dark</option>
  </select>

  <button onclick="generate()">Generate Preview</button>
  <button onclick="download()">Download All (ZIP)</button>
</div>

  </div>

  <div id="preview"></div>

</div>

<script>
let images = [];

/* LOAD */
function loadImages(files) {
  return Promise.all([...files].map(file => {
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => res(img);
        img.src = e.target.result;
      };
      r.readAsDataURL(file);
    });
  }));
}

/* DRAW WATERMARK */
function drawWatermarked(ctx, img, W, H) {

  ctx.drawImage(img, 0, 0, W, H);

  const text = "@eidams_secrets   @eidams_secrets   @eidams_secrets";
  const fontSize = H * 0.08;

  const mode = document.getElementById("mode").value;
  const color = document.getElementById("color").value;

  if (color === "white") {
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.shadowColor = "rgba(0,0,0,0.5)";
  } else {
    ctx.fillStyle = "rgba(40,40,40,0.35)";
    ctx.shadowColor = "rgba(255,255,255,0.3)";
  }

  ctx.shadowBlur = 4;
  ctx.textAlign = "center";
  ctx.font = `bold ${fontSize}px Comic Sans MS`;

  // TOP
  ctx.fillText(text, W / 2, H * 0.08);

  // MIDDLE
  if (mode === "3") {
    ctx.fillText(text, W / 2, H * 0.52);
  }

  // BOTTOM
  ctx.fillText(text, W / 2, H * 0.97);
}

/* SINGLE DOWNLOAD */
function downloadSingle(img, index) {
  const canvas = document.createElement("canvas");
  canvas.width = img.width;
  canvas.height = img.height;

  const ctx = canvas.getContext("2d");

  drawWatermarked(ctx, img, canvas.width, canvas.height);

  const link = document.createElement("a");
  link.download = `watermarked_${index + 1}.png`;
  link.href = canvas.toDataURL("image/png");
  link.click();
}

/* PREVIEW */
async function generate() {
  const files = document.getElementById("upload").files;
  if (!files.length) return alert("Upload images first");

  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  images = await loadImages(files);

  for (let i = 0; i < images.length; i++) {
    const img = images[i];

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const previewHeight = 500;

    canvas.height = previewHeight;
    canvas.width = img.width * (previewHeight / img.height);

    drawWatermarked(ctx, img, canvas.width, canvas.height);

    canvas.onclick = () => downloadSingle(img, i);

    preview.appendChild(canvas);
  }
}

/* ZIP DOWNLOAD */
async function download() {
  const files = document.getElementById("upload").files;
  if (!files.length) return alert("Upload images first");

  const imgs = await loadImages(files);
  const zip = new JSZip();

  for (let i = 0; i < imgs.length; i++) {
    const img = imgs[i];

    const canvas = document.createElement("canvas");
    canvas.width = img.width;
    canvas.height = img.height;

    const ctx = canvas.getContext("2d");

    drawWatermarked(ctx, img, canvas.width, canvas.height);

    const base64 = canvas.toDataURL("image/png").split(",")[1];

    zip.file(`watermarked_${i + 1}.png`, base64, { base64: true });
  }

  const blob = await zip.generateAsync({ type: "blob" });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "watermarked_images.zip";
  link.click();
}
</script>

</body>
</html>
