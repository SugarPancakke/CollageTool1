<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deep Echoes Collage</title>

<link rel="icon" href="../icon.png?v=999">

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: white;
}

.container {
  width: 900px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tool {
  background: #643545;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  width: 100%;
  box-sizing: border-box;
}

button {
  margin-top: 10px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #db8b9a;
  color: white;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  background: #c06f7f;
}

canvas {
  display: block;
  transform: scale(0.43);
  transform-origin: center top;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

  <div class="tool">
    <button onclick="goBack()">← Back</button>
    <h2>Deep Echoes Collage</h2>
    <input type="file" id="upload" multiple accept="image/*">
    <button onclick="generate()">Generate</button>
    <button onclick="download()">Download PNG</button>
  </div>

<canvas id="canvas" width="2500" height="1220"></canvas>

</div>

<script>

/* ✅ ENVIRONMENT GUARD */
const isBrowser = typeof window !== "undefined" && typeof document !== "undefined";

/* SAFE CANVAS INIT */
let canvas = null;
let ctx = null;

if (isBrowser) {
  canvas = document.getElementById("canvas");
  if (canvas && canvas.getContext) {
    ctx = canvas.getContext("2d");
  }
}

/* CONSTANTS */
const mm = 3.78;
const gap = 2.5 * mm;
const whiteFrame = 3.5 * mm;
const outerTop = 6 * mm;
const outerSide = 6 * mm;
const outerBottom = 18 * mm;

let images = [];

/* IMAGE ORDER */
const getImageIndex = (r, c) => r === 0 ? c * 2 : c * 2 + 1;

/* PLACEHOLDER (PATH UNCHANGED) */
let placeholderReady = false;
let placeholder = null;

if (isBrowser) {
  placeholder = new Image();
  placeholder.src = "../image/T_showpic_clothes_blank.png";

  placeholder.onload = () => {
    placeholderReady = true;
    draw();
  };

  /* ✅ FALLBACK */
  placeholder.onerror = () => {
    console.warn("Placeholder failed, using fallback");

    const fallback = document.createElement("canvas");
    fallback.width = 500;
    fallback.height = 500;

    const fctx = fallback.getContext("2d");
    fctx.fillStyle = "#2a2a2a";
    fctx.fillRect(0, 0, fallback.width, fallback.height);

    fctx.fillStyle = "#888";
    fctx.font = "bold 40px Arial";
    fctx.textAlign = "center";
    fctx.textBaseline = "middle";
    fctx.fillText("No Image", fallback.width / 2, fallback.height / 2);

    placeholder = new Image();
    placeholder.src = fallback.toDataURL();

    placeholderReady = true;
    draw();
  };
}

/* BACK */
function goBack() {
  if (!isBrowser) return;
  window.location.href = "/CollageTool/";
}

/* LOAD IMAGES */
function loadImages(files) {
  if (!isBrowser) return Promise.resolve([]);

  return Promise.all([...files].map(file => {
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => res(img);
        img.onerror = () => res(null);
        img.src = e.target.result;
      };
      r.readAsDataURL(file);
    });
  }));
}

/* DRAW IMAGE */
function drawCover(img, x, y, w, h) {
  if (!ctx || !img) return;

  const scale = Math.max(w / img.width, h / img.height);
  const sw = w / scale;
  const sh = h / scale;

  const sx = (img.width - sw) / 2;
  const sy = (img.height - sh) / 2;

  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

/* SAFE */
function safe(img) {
  return img || placeholder;
}

/* LABEL */
function drawLabel(text, x, y) {
  if (!ctx) return;

  ctx.fillStyle = "rgba(22, 22, 29, 0.7)";
  ctx.font = "bold 50px Comic Sans MS";
  ctx.textBaseline = "top";
  ctx.textAlign = "left";
  ctx.fillText(text, x + 12, y + 12);
}

/* GENERATE */
async function generate() {
  if (!isBrowser) return;

  const input = document.getElementById("upload");
  if (!input) return;

  const files = input.files;
  if (!files || !files.length) return;

  images = await loadImages(files);

  while (images.length < 12) {
    images.push(null);
  }

  draw();
}

/* DRAW */
function draw() {
  if (!ctx || !canvas) return;
  if (!placeholderReady) return;

  const W = canvas.width;
  const H = canvas.height;

  ctx.fillStyle = "#16161d";
  ctx.fillRect(0, 0, W, H);

  const innerX = outerSide;
  const innerY = outerTop;
  const innerW = W - outerSide * 2;
  const innerH = H - outerTop - outerBottom;

  ctx.fillStyle = "white";
  ctx.fillRect(innerX, innerY, innerW, innerH);

  const frameX = innerX + whiteFrame;
  const frameY = innerY + whiteFrame;
  const frameW = innerW - whiteFrame * 2;
  const frameH = innerH - whiteFrame * 2;

  const cols = 6;
  const rows = 2;

  const colW = (frameW - gap * (cols - 1)) / cols;
  const rowH = (frameH - gap * (rows - 1)) / rows;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {

      const imgIndex = getImageIndex(r, c);

      const x = frameX + c * (colW + gap);
      const y = frameY + r * (rowH + gap);

      drawCover(safe(images[imgIndex]), x, y, colW, rowH);
    }
  }

  drawLabel("Base:", frameX + 15, frameY + 15);
  drawLabel("Glow-up:", frameX + 15, frameY + rowH + gap + 15);
}

/* DOWNLOAD */
function download() {
  if (!canvas) return;

  const link = document.createElement("a");
  link.download = "collage.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

</script>

</body>
</html>
