<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video Watermark</title>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>

<style>
body {
  background:#391823;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  padding:20px;
}

.container { width:800px; }

button {
  background:#db8b9a;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

progress {
  width:100%;
  margin-top:10px;
}

video {
  width:100%;
  margin-top:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Video Watermark</h2>

<input type="file" id="file" accept="video/*">
<br><br>

<button onclick="run()">Add Watermark</button>

<progress id="progress" value="0" max="1"></progress>

<div id="preview"></div>

</div>

<script>
const { createFFmpeg, fetchFile } = FFmpeg;

const ffmpeg = createFFmpeg({
  log:true,
  progress: ({ ratio }) => {
    document.getElementById("progress").value = ratio;
  }
});

/* 🎬 INSTANT PREVIEW */
document.getElementById("file").onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);

  const video = document.createElement("video");
  video.src = url;
  video.controls = true;

  const preview = document.getElementById("preview");
  preview.innerHTML = "<p>Original Video:</p>";
  preview.appendChild(video);
};

async function run(){
  const file = document.getElementById("file").files[0];
  if(!file) return alert("Upload video");

  if(!ffmpeg.isLoaded()) await ffmpeg.load();

  document.getElementById("progress").value = 0;

  ffmpeg.FS('writeFile','in.mp4',await fetchFile(file));

  await ffmpeg.run(
    '-i','in.mp4',
    '-vf',
    "drawtext=text='@eidams_secrets':x=(w-text_w)/2:y=h*0.9:fontsize=40:fontcolor=white@0.2",
    '-preset','ultrafast',
    '-crf','18',
    '-codec:a','copy',
    'out.mp4'
  );

  const data = ffmpeg.FS('readFile','out.mp4');

  const url = URL.createObjectURL(
    new Blob([data.buffer], { type: 'video/mp4' })
  );

  const video = document.createElement("video");
  video.src = url;
  video.controls = true;

  const preview = document.getElementById("preview");
  preview.innerHTML = "<p>Watermarked Video:</p>";
  preview.appendChild(video);

  const a = document.createElement("a");
  a.href = url;
  a.download = "watermarked.mp4";
  a.click();
}
</script>

</body>
</html>
