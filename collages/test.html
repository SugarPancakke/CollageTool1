<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video Watermark</title>
</head>

<body style="background:#222;color:white;text-align:center;font-family:Arial">

<h2>Video Watermark</h2>

<input type="file" id="file" accept="video/*"><br><br>
<button onclick="start()">Start</button>

<video id="video" controls style="max-width:500px;margin-top:15px"></video>
<canvas id="canvas" style="display:none"></canvas>

<script>
async function start(){
  const file = document.getElementById("file").files[0];
  if(!file) return alert("Upload video");

  const video = document.getElementById("video");
  video.src = URL.createObjectURL(file);

  await video.play();

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const stream = canvas.captureStream();

  let recorder;

  // Try MP4 first
  if (MediaRecorder.isTypeSupported("video/mp4")) {
    recorder = new MediaRecorder(stream, { mimeType: "video/mp4" });
  } else {
    recorder = new MediaRecorder(stream); // fallback webm
  }

  let chunks = [];
  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: recorder.mimeType });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = recorder.mimeType.includes("mp4")
      ? "watermarked.mp4"
      : "watermarked.webm";
    a.click();
  };

  recorder.start();

  function draw(){
    ctx.drawImage(video,0,0);

    const text = "@eidams_secrets";

    // responsive font
    const fontSize = canvas.height * 0.06;
    ctx.font = `bold ${fontSize}px Comic Sans MS`;
    ctx.fillStyle = "rgba(255,255,255,0.2)";
    ctx.textAlign = "center";

    // EDGE POSITIONS (tuned to match your image)
    const topY = fontSize * 1.0;
    const midY = canvas.height * 0.52;
    const bottomY = canvas.height - fontSize * 0.3;

    const cols = 3;

    function drawRow(y){
      for(let i = 0; i < cols; i++){
        const x = (canvas.width / cols) * (i + 0.5);
        ctx.fillText(text, x, y);
      }
    }

    drawRow(topY);
    drawRow(midY);
    drawRow(bottomY);

    if(!video.ended){
      requestAnimationFrame(draw);
    } else {
      recorder.stop();
    }
  }

  draw();
}
</script>

</body>
</html>
