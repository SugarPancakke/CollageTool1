<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ID Extractor</title>

<style>
  body {
    margin: 0;
    background: #322d2d;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
  }

  .wrapper {
    width: 95%;
    max-width: 900px;
    margin-top: 40px;
  }

  textarea {
    width: 100%;
    height: 350px;
    background: #3d3838;
    color: white;
    border: none;
    padding: 10px;
    box-sizing: border-box;
    font-family: monospace;
    font-size: 14px;
    resize: none;
  }

  button {
    background: #4d4747;
    color: white;
    border: none;
    padding: 12px 30px;
    margin: 20px 0;
    cursor: pointer;
    font-size: 16px;
  }

  .output {
    background: #3d3838;
    padding: 10px;
    min-height: 200px;
    white-space: pre-wrap;
    font-family: monospace;
    overflow-x: auto;
  }
</style>
</head>

<body>

<div class="wrapper">

  <h2>ID Extractor</h2>

  <textarea id="input" placeholder="Paste filenames here..."></textarea>

  <button onclick="extractIDs()">Extract IDs</button>

  <div class="output" id="output"></div>

</div>

<script>
function extractIDs() {

  const text = document.getElementById("input").value;

  // Match S followed by 4 digits
  const matches = text.match(/S\d{4}/g) || [];

  // Remove duplicates
  const unique = [...new Set(matches)];

  // Show results
  document.getElementById("output").textContent =
    unique.join("\n");
}
</script>

</body>
</html>
