<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deep Echoes Collage</title>

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: white;
}

.container {
  width: 900px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tool {
  background: #643545;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  width: 100%;
  box-sizing: border-box;
}

button {
  margin-top: 10px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #db8b9a;
  color: white;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  background: #c06f7f;
}

canvas {
  display: block;
  transform: scale(0.43);
  transform-origin: center top;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="tool">
    <button onclick="goBack()">← Back</button>

    <h2>Deep Echoes Collage</h2>

    <input type="file" id="upload" multiple accept="image/*">

    <button onclick="generate()">Generate</button>
    <button onclick="download()">Download PNG</button>
  </div>

  <canvas id="canvas" width="2500" height="1220"></canvas>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const mm = 3.78;

const gap = 2.5 * mm;
const whiteFrame = 3.5 * mm;

const outerTop = 6 * mm;
const outerSide = 6 * mm;
const outerBottom = 18 * mm;

let images = [];

/* LABEL POSITIONS */
const labels = {
  0: "Base:",
  6: "Glow-up:"
};

/* PLACEHOLDER */
const placeholder = new Image();
placeholder.src = "../image/T_showpic_clothes_blank.png";

let placeholderReady = false;
placeholder.onload = () => {
  placeholderReady = true;
  draw();
};

/* BACK */
function goBack() {
  window.location.href = "/CollageTool/";
}

/* LOAD IMAGES */
function loadImages(files) {
  return Promise.all([...files].map(file => {
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => res(img);
        img.src = e.target.result;
      };
      r.readAsDataURL(file);
    });
  }));
}

/* COVER DRAW */
function drawCover(img, x, y, w, h) {
  const scale = Math.max(w / img.width, h / img.height);
  const sw = w / scale;
  const sh = h / scale;

  const sx = (img.width - sw) / 2;
  const sy = (img.height - sh) / 2;

  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

/* SAFE */
function safe(img) {
  return img ? img : placeholder;
}

/* LABEL */
function drawLabel(text, x, y) {
  ctx.fillStyle = "rgba(22, 22, 29, 0.7)";
  ctx.font = "bold 50px Comic Sans MS";
  ctx.textBaseline = "top";
  ctx.fillText(text, x + 12, y + 12);
}

/* GENERATE */
async function generate() {
  const files = document.getElementById("upload").files;
  if (!files.length) return alert("Upload images first");

  images = await loadImages(files);

  while (images.length < 12) {
    images.push(null);
  }

  draw();
}

/* DRAW */
function draw() {
  if (!placeholderReady) return;

  const W = canvas.width;
  const H = canvas.height;

  ctx.fillStyle = "#16161d";
  ctx.fillRect(0, 0, W, H);

  const innerX = outerSide;
  const innerY = outerTop;
  const innerW = W - outerSide * 2;
  const innerH = H - outerTop - outerBottom;

  ctx.fillStyle = "white";
  ctx.fillRect(innerX, innerY, innerW, innerH);

  const frameX = innerX + whiteFrame;
  const frameY = innerY + whiteFrame;
  const frameW = innerW - whiteFrame * 2;
  const frameH = innerH - whiteFrame * 2;

  const cols = 6;
  const rows = 2;

  const colW = (frameW - gap * (cols - 1)) / cols;
  const rowH = (frameH - gap * (rows - 1)) / rows;

  let i = 0;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {

      const x = frameX + c * (colW + gap);
      const y = frameY + r * (rowH + gap);

      const index = r * cols + c;

      drawCover(
        safe(images[i++]),
        x,
        y,
        colW,
        rowH
      );

      if (labels[index]) {
        drawLabel(labels[index], x, y);
      }
    }
  }

  /* WATERMARK (RESTORED LOOK + SAFE CLAMP ONLY) */
  const text = "@eidams_secrets  @eidams_secrets  @eidams_secrets  @eidams_secrets";

  ctx.fillStyle = "rgba(84,84,84,0.75)";
  ctx.font = "bold 40px Comic Sans MS";
  ctx.textBaseline = "alphabetic";

  const tw = ctx.measureText(text).width;

  let yText = H - (outerBottom / 2) + 15;

  const minY = 40;
  const maxY = H - 10;

  if (yText > maxY) yText = maxY;
  if (yText < minY) yText = minY;

  ctx.fillText(text, (W - tw) / 2, yText);
}

/* DOWNLOAD */
function download() {
  const link = document.createElement("a");
  link.download = "collage.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
