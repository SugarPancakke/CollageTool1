<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>8 Piece Collage</title>

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: white;
}

.container {
  width: 900px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tool {
  background: #643545;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  width: 100%;
  box-sizing: border-box;
}

.tool > button:first-child {
  margin-top: 10px;
}

h2 {
  margin-bottom: 30px;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: nowrap;
  align-items: center;
}

/* BUTTONS */
button {
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #db8b9a;
  color: white;
  cursor: pointer;
  transition: 0.2s ease;
  font-size: 14px;
  white-space: nowrap;
}

button:hover {
  background: #c06f7f;
}

.button-group {
  display: flex;
  gap: 10px;
}

canvas {
  display: block;
  transform: scale(0.43);
  transform-origin: center top;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

  <div class="tool">
    <button onclick="goBack()">← Back</button>
    <h2>8 Pieces Collage</h2>

<div class="controls">
  <input type="file" id="upload" multiple accept="image/*">

  <div class="button-group">
    <button onclick="generate()">Generate</button>
    <button onclick="download()">Download PNG</button>
  </div>
</div>

  </div>

<canvas id="canvas" width="1450" height="1510"></canvas>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const mm = 3.78;

const gap = 2.5 * mm;
const whiteFrame = 3.5 * mm;

const outerTop = 6 * mm;
const outerSide = 6 * mm;
const outerBottom = 18 * mm;

let images = [];
let bigImage = null;

/* ORDER (same as parser) */
const orderedIDs = [
  "H","D","C","T","PP","S","BB",
  "AHE","AHC","AEA","ANE","AHA","AXQ","G","AGL","AFA",
  "AXS","ALE","ABS","AJZ","ARM","ABA","ABK"
];

const placeholder = new Image();
placeholder.src = "../image/T_showpic_clothes_blank.png";

let placeholderReady = false;
placeholder.onload = () => {
  placeholderReady = true;
  draw();
};

const slotBackground = new Image();
slotBackground.src = "../image/T_showpic_clothes_blank.png";

function goBack() {
  window.location.href = "/CollageTool/";
}

function loadImages(files) {
  return Promise.all([...files].map(file => {
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => res({ img, name: file.name });
        img.src = e.target.result;
      };
      r.readAsDataURL(file);
    });
  }));
}

function drawCover(img, x, y, w, h) {
  const scale = Math.max(w / img.width, h / img.height);
  const sw = w / scale;
  const sh = h / scale;

  const sx = (img.width - sw) / 2;
  const sy = (img.height - sh) / 2;

  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

function safe(img) {
  return img ? img : placeholder;
}

async function generate() {
  const files = document.getElementById("upload").files;
  if (!files.length) return alert("Upload images first");

  const loaded = await loadImages(files);

  images = [];
  bigImage = null;

  let mapped = [];
  let normalImages = [];

  for (const item of loaded) {
    const name = item.name.toUpperCase();

    // detect BIG image
    if (name.startsWith("T_SHOWPIC_SUIT_")) {
      bigImage = item.img;
      continue;
    }

    // extract ID from S####XXX
    let match = name.match(/S\d+([A-Z]+)/);

    if (match) {
      let id = match[1];

      mapped.push({
        id,
        img: item.img
      });
    } else {
      normalImages.push(item.img);
    }
  }

  // sort by outfit order
  mapped.sort((a, b) => {
    return orderedIDs.indexOf(a.id) - orderedIDs.indexOf(b.id);
  });

  images = mapped.map(m => m.img);

  // add any unmatched images at end
  images.push(...normalImages);

  // fallback big image
  if (!bigImage && images.length > 0) {
    bigImage = images.pop();
  }

  draw();
}

function draw() {
  if (!placeholderReady) return;

  const W = canvas.width;
  const H = canvas.height;

  ctx.fillStyle = "#16161d";
  ctx.fillRect(0, 0, W, H);

  const innerX = outerSide;
  const innerY = outerTop;
  const innerW = W - outerSide * 2;
  const innerH = H - outerTop - outerBottom;

  ctx.fillStyle = "white";
  ctx.fillRect(innerX, innerY, innerW, innerH);

  const frameX = innerX + whiteFrame;
  const frameY = innerY + whiteFrame;
  const frameW = innerW - whiteFrame * 2;
  const frameH = innerH - whiteFrame * 2;

  const colW = (frameW - gap * 3) / 4;
  const rowH = (frameH - gap * 2) / 3;

  let i = 0;

  for (let c = 0; c < 4; c++) {
    drawCover(safe(images[i++]), frameX + c * (colW + gap), frameY, colW, rowH);
  }

  const y2 = frameY + rowH + gap;
  const y3 = y2 + rowH + gap;

  for (let c = 0; c < 2; c++) {
    drawCover(safe(images[i++]), frameX + c * (colW + gap), y2, colW, rowH);
  }

  for (let c = 0; c < 2; c++) {
    drawCover(safe(images[i++]), frameX + c * (colW + gap), y3, colW, rowH);
  }

  const bx = frameX + 2 * (colW + gap);
  const by = y2;
  const bw = colW * 2 + gap;
  const bh = rowH * 2 + gap;

  if (slotBackground.complete) {
    ctx.drawImage(slotBackground, bx, by, bw, bh);
  }

  drawCover(safe(bigImage), bx, by, bw, bh);

  /* ROW WATERMARK */
  const overlayText = "@eidams_secrets @eidams_secrets";

  ctx.fillStyle = "rgba(255,255,255,0.20)";
  ctx.textAlign = "center";
  ctx.font = "bold 79px Comic Sans MS";

  const positions = [
    frameY + 78,
    frameY + rowH + gap + 78,
    frameY + (rowH + gap) * 2 + 78
  ];

  positions.forEach(y => {
    ctx.fillText(overlayText, frameX + frameW / 2, y);
  });

  /* BOTTOM WATERMARK */
  const text = "@eidams_secrets  @eidams_secrets";

  ctx.fillStyle = "rgba(84,84,84,0.75)";
  ctx.font = "bold 40px Comic Sans MS";

  ctx.fillText(text, W / 2, H - (outerBottom / 2) + 15);
}

function download() {
  const link = document.createElement("a");
  link.download = "collage.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
