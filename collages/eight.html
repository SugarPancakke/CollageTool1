<script>

/* SETUP */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const MM = 3.78;

const CONFIG = {
  gap: 2.5 * MM,
  frame: 3.5 * MM,
  outerTop: 6 * MM,
  outerSide: 6 * MM,
  outerBottom: 18 * MM
};

let images = [];
let bigImage = null;

/* ASSETS */
const placeholder = new Image();
placeholder.src = "../image/T_showpic_clothes_blank.png";

const slotBackground = new Image();
slotBackground.src = "../image/T_showpic_clothes_blank.png";

let placeholderReady = false;

placeholder.onload = () => {
  placeholderReady = true;
  draw();
};

/* NAVIGATION */
function goBack() {
  window.location.href = "/CollageTool/";
}

/* IMAGE LOADING */
function loadImages(files) {
  return Promise.all(
    [...files].map(file => new Promise(resolve => {
      const reader = new FileReader();

      reader.onload = e => {
        const img = new Image();
        img.onload = () => resolve({ img, name: file.name });
        img.src = e.target.result;
      };

      reader.readAsDataURL(file);
    }))
  );
}

/* DRAW HELPERS */
function drawCover(img, x, y, w, h) {
  const scale = Math.max(w / img.width, h / img.height);

  const sw = w / scale;
  const sh = h / scale;

  const sx = (img.width - sw) / 2;
  const sy = (img.height - sh) / 2;

  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

function getSafeImage(img) {
  return img || placeholder;
}

/* GENERATE */
async function generate() {
  const files = document.getElementById("upload").files;
  if (!files.length) {
    alert("Upload images first");
    return;
  }

  const loaded = await loadImages(files);

  images = [];
  bigImage = null;

  const normalImages = [];

  for (const item of loaded) {
    if (item.name.startsWith("T_showpic_suit_")) {
      bigImage = item.img;
    } else {
      normalImages.push(item.img);
    }
  }

  if (!bigImage && normalImages.length) {
    bigImage = normalImages.shift();
  }

  images = normalImages;

  draw();
}

/* DRAW GRID */
function drawRow(startIndex, count, x, y, colW, rowH, gap) {
  for (let i = 0; i < count; i++) {
    drawCover(
      getSafeImage(images[startIndex + i]),
      x + i * (colW + gap),
      y,
      colW,
      rowH
    );
  }
}

/* DRAW */
function draw() {
  if (!placeholderReady) return;

  const W = canvas.width;
  const H = canvas.height;

  const { gap, frame, outerTop, outerSide, outerBottom } = CONFIG;

  ctx.fillStyle = "#16161d";
  ctx.fillRect(0, 0, W, H);

  const inner = {
    x: outerSide,
    y: outerTop,
    w: W - outerSide * 2,
    h: H - outerTop - outerBottom
  };

  ctx.fillStyle = "white";
  ctx.fillRect(inner.x, inner.y, inner.w, inner.h);

  const frameBox = {
    x: inner.x + frame,
    y: inner.y + frame,
    w: inner.w - frame * 2,
    h: inner.h - frame * 2
  };

  const colW = (frameBox.w - gap * 3) / 4;
  const rowH = (frameBox.h - gap * 2) / 3;

  let index = 0;

  drawRow(index, 4, frameBox.x, frameBox.y, colW, rowH, gap);
  index += 4;

  const y2 = frameBox.y + rowH + gap;
  const y3 = y2 + rowH + gap;

  drawRow(index, 2, frameBox.x, y2, colW, rowH, gap);
  index += 2;

  drawRow(index, 2, frameBox.x, y3, colW, rowH, gap);

  const big = {
    x: frameBox.x + 2 * (colW + gap),
    y: y2,
    w: colW * 2 + gap,
    h: rowH * 2 + gap
  };

  if (slotBackground.complete) {
    ctx.drawImage(slotBackground, big.x, big.y, big.w, big.h);
  }

  drawCover(getSafeImage(bigImage), big.x, big.y, big.w, big.h);

  const text = "@eidams_secrets  @eidams_secrets  @eidams_secrets";

  ctx.fillStyle = "rgba(84,84,84,0.75)";
  ctx.font = "bold 40px Comic Sans MS";

  const tw = ctx.measureText(text).width;
  ctx.fillText(text, (W - tw) / 2, H - (outerBottom / 2) + 15);
}

/* DOWNLOAD */
function download() {
  const link = document.createElement("a");
  link.download = "collage.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

</script>
