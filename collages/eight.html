<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>8 Piece Collage</title>

<style>
body {
  margin: 0;
  background: #2a0f1c;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: white;
}

/* MAIN WRAPPER */
.container {
  width: 900px;
}

/* GLASS TOOL PANEL */
.tool {
  background: rgba(100, 53, 69, 0.35);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 15px;
  border-radius: 18px;
  margin-bottom: 15px;
  border: 1px solid rgba(219, 139, 154, 0.25);
  box-shadow: 0 8px 25px rgba(0,0,0,0.25);
}

/* PREMIUM BUTTONS */
button {
  margin-top: 10px;
  padding: 10px 14px;
  border: none;
  border-radius: 12px;
  background: rgba(219, 139, 154, 0.85);
  color: white;
  cursor: pointer;
  transition: 0.25s ease;
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

button:hover {
  background: #db8b9a;
  transform: translateY(-2px);
}

/* CANVAS LOOK */
canvas {
  margin-top: 15px;
  border-radius: 16px;
  transform: scale(0.7);
  transform-origin: top center;
  box-shadow: 0 12px 35px rgba(0,0,0,0.35);
}
</style>
</head>

<body>

<div class="container">

  <div class="tool">
    <h2>Collage Tool</h2>
    <input type="file" id="upload" multiple accept="image/*">
    <button onclick="generate()">Generate</button>
    <button onclick="download()">Download PNG</button>
  </div>

  <canvas id="canvas" width="1450" height="1510"></canvas>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const mm = 3.78;

// SETTINGS
const gap = 2.5 * mm;
const whiteFrame = 3.5 * mm;

const outerTop = 6 * mm;
const outerSide = 6 * mm;
const outerBottom = 14 * mm;

let images = [];
let bigImage = null;

// BACKGROUND
const slotBackground = new Image();
slotBackground.src = "../image/T_showpic_clothes_blank.png";

// LOAD IMAGES
function loadImages(files) {
  return Promise.all([...files].map(file => {
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => {
        const img = new Image();
        img.onload = () => {
          res({ img, name: file.name });
        };
        img.src = e.target.result;
      };
      r.readAsDataURL(file);
    });
  }));
}

// DRAW COVER
function drawCover(img, x, y, w, h) {
  const scale = Math.max(w / img.width, h / img.height);
  const sw = w / scale;
  const sh = h / scale;

  const sx = (img.width - sw) / 2;
  const sy = (img.height - sh) / 2;

  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

// GENERATE (slot 9 rule kept)
async function generate() {
  const files = document.getElementById("upload").files;
  if (!files.length) return alert("Upload images first");

  const loaded = await loadImages(files);

  images = [];
  bigImage = null;

  let normalImages = [];

  for (const item of loaded) {
    if (item.name.startsWith("T_showpic_suit_")) {
      bigImage = item.img;
    } else {
      normalImages.push(item.img);
    }
  }

  if (!bigImage && normalImages.length > 0) {
    bigImage = normalImages.shift();
  }

  images = normalImages;

  draw();
}

// DRAW
function draw() {
  const W = canvas.width;
  const H = canvas.height;

  ctx.fillStyle = "#2a0f1c";
  ctx.fillRect(0, 0, W, H);

  const innerX = outerSide;
  const innerY = outerTop;
  const innerW = W - outerSide * 2;
  const innerH = H - outerTop - outerBottom;

  // GLASS FRAME
  ctx.fillStyle = "rgba(255,255,255,0.12)";
  ctx.beginPath();
  ctx.roundRect(innerX, innerY, innerW, innerH, 18);
  ctx.fill();

  const frameX = innerX + whiteFrame;
  const frameY = innerY + whiteFrame;
  const frameW = innerW - whiteFrame * 2;
  const frameH = innerH - whiteFrame * 2;

  const colW = (frameW - gap * 3) / 4;
  const rowH = (frameH - gap * 2) / 3;

  let i = 0;

  for (let c = 0; c < 4; c++) {
    if (images[i]) drawCover(images[i++], frameX + c * (colW + gap), frameY, colW, rowH);
  }

  const y2 = frameY + rowH + gap;
  const y3 = y2 + rowH + gap;

  for (let c = 0; c < 2; c++) {
    if (images[i]) drawCover(images[i++], frameX + c * (colW + gap), y2, colW, rowH);
  }

  for (let c = 0; c < 2; c++) {
    if (images[i]) drawCover(images[i++], frameX + c * (colW + gap), y3, colW, rowH);
  }

  const bx = frameX + 2 * (colW + gap);
  const by = y2;
  const bw = colW * 2 + gap;
  const bh = rowH * 2 + gap;

  if (slotBackground.complete) {
    ctx.drawImage(slotBackground, bx, by, bw, bh);
  }

  if (bigImage) {
    drawCover(bigImage, bx, by, bw, bh);
  }

  const text = "@eidams_secrets  @eidams_secrets  @eidams_secrets";

  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.font = "bold 40px Arial";

  const tw = ctx.measureText(text).width;
  ctx.fillText(text, (W - tw) / 2, H - (outerBottom / 2) + 15);
}

// DOWNLOAD
function download() {
  const link = document.createElement("a");
  link.download = "collage.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
