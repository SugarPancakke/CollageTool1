<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Outfit Parser</title>
</head>
<body>

<h2>Upload Images</h2>
<input type="file" id="fileInput" multiple>
<button onclick="generateList()">Generate List</button>

<h3>Result:</h3>
<p id="output"></p>

<script>
const idMap = {
  "H": "Hair",
  "D": "Dress",
  "C": "Outerwear",
  "T": "Top",
  "PP": "Bottom",
  "S": "Socks",
  "BB": "Shoes",

  "AHE": "Hair Accessory",
  "AHC": "Headwear",
  "AEA": "Earrings",
  "ANE": "Neckwear",
  "AHA": "Bracelet",
  "AXQ": "Choker",
  "G": "Gloves",
  "AGL": "Face Decoration",
  "AXS": "Chest Accessory",
  "ALE": "Pendant",
  "ABS": "Backpiece",
  "AJZ": "Rings",
  "ARM": "Arm Decoration",
  "ABA": "Handheld",
  "ABK": "Body Paint"
};

function generateList() {
  const files = document.getElementById("fileInput").files;
  let foundItems = new Set();

  for (let file of files) {
    let name = file.name.toUpperCase();

    name = name.split(".")[0];

    let parts = name.split(/[_\-\s]+/);

    for (let part of parts) {
      if (idMap[part]) {
        foundItems.add(idMap[part]);
      }
    }
  }

  document.getElementById("output").textContent =
    Array.from(foundItems).join(", ");
}
</script>

</body>
</html>
