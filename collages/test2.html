<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Outfit Parser</title>
</head>
<body>

<h2>Upload Images</h2>
<input type="file" id="fileInput" multiple>
<button onclick="generateList()">Generate List</button>

<h3>Result:</h3>
<p id="output"></p>

<script>
/*NAMES*/
const idMap = {
  "H": "Hair",
  "D": "Dress",
  "C": "Outerwear",
  "T": "Top",
  "PP": "Bottom",
  "S": "Socks",
  "BB": "Shoes",

  "AHE": "Hair Accessory",
  "AHC": "Headwear",
  "AEA": "Earrings",
  "ANE": "Neckwear",
  "AHA": "Bracelet",
  "AXQ": "Choker",
  "G": "Gloves",
  "AGL": "Face Decoration",
  "AXS": "Chest Accessory",
  "ALE": "Pendant",
  "ABS": "Backpiece",
  "AJZ": "Rings",
  "ARM": "Arm Decoration",
  "ABA": "Handheld",
  "ABK": "Body Paint"
};

/*ORDER*/
const orderedIDs = [
  "H","D","C","T","PP","S","BB",
  "AHE","AHC","AEA","ANE","AHA","AXQ","G","AGL",
  "AXS","ALE","ABS","AJZ","ARM","ABA","ABK"
];

const detectionIDs = [...orderedIDs].sort((a,b) => b.length - a.length);

function generateList() {
  const files = document.getElementById("fileInput").files;
  let found = new Set();

  for (let file of files) {
    let name = file.name.toUpperCase();

    // 🔥 FIX START (only real change)
    name = name.split(".")[0];                 // remove extension
    let lastPart = name.split("_").pop();      // get last section
    let clean = lastPart.replace(/[0-9]/g, "");// remove numbers

    for (let id of detectionIDs) {
      if (clean.includes(id)) {
        found.add(id);
        clean = clean.replace(id, ""); // prevent overlap
      }
    }
    // 🔥 FIX END
  }

  let result = orderedIDs
    .filter(id => found.has(id))
    .map(id => idMap[id]);

  document.getElementById("output").textContent = result.join(", ");
}
</script>

</body>
</html>
