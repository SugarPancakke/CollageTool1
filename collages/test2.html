<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watermark Tool - Icons</title>

<style>
body {
  margin: 0;
  background: #391823;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: white;
}

.container { width:1000px; }

.controls {
  display:flex;
  gap:10px;
  align-items:center;
}

.icon-btn {
  padding:10px;
  border-radius:8px;
  background:#b06a7a;
  cursor:pointer;
}

.icon-btn.active {
  background:#db8b9a;
}

/* PREVIEW */
#preview {
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
}

canvas {
  height:300px;
  width:auto;
  cursor:pointer;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>

<body>

<div class="container">

<div class="controls">
<input type="file" id="upload" multiple>

<!-- LINE ICONS -->

<div class="icon-btn active" data-mode="2">II</div>
<div class="icon-btn" data-mode="3">III</div>

<!-- COLOR ICONS -->

<div class="icon-btn active" data-color="white">☀</div>
<div class="icon-btn" data-color="dark">🌙</div>

<button onclick="generate()">Generate</button> <button onclick="download()">ZIP</button>

</div>

<div id="preview"></div>

</div>

<script>
let images=[],mode="2",color="white";

/* ICONS */
document.querySelectorAll(".icon-btn").forEach(btn=>{
  btn.onclick=()=>{
    if(btn.dataset.mode){
      mode=btn.dataset.mode;
      document.querySelectorAll("[data-mode]").forEach(b=>b.classList.remove("active"));
    }
    if(btn.dataset.color){
      color=btn.dataset.color;
      document.querySelectorAll("[data-color]").forEach(b=>b.classList.remove("active"));
    }
    btn.classList.add("active");
  };
});

/* LOAD */
function loadImages(files){
  return Promise.all([...files].map(f=>{
    return new Promise(res=>{
      const r=new FileReader();
      r.onload=e=>{
        const img=new Image();
        img.onload=()=>res(img);
        img.src=e.target.result;
      };
      r.readAsDataURL(f);
    });
  }));
}

/* DRAW */
function draw(ctx,img,W,H){
  ctx.drawImage(img,0,0,W,H);

  const text="@eidams_secrets   @eidams_secrets   @eidams_secrets";
  const size=H*0.08;

  ctx.fillStyle=color==="white"?"rgba(255,255,255,0.35)":"rgba(40,40,40,0.35)";
  ctx.textAlign="center";
  ctx.font=`bold ${size}px Comic Sans MS`;

  ctx.fillText(text,W/2,H*0.08);
  if(mode==="3") ctx.fillText(text,W/2,H*0.52);
  ctx.fillText(text,W/2,H*0.97);
}

/* GENERATE */
async function generate(){
  const files=document.getElementById("upload").files;
  const preview=document.getElementById("preview");
  preview.innerHTML="";

  images=await loadImages(files);

  images.forEach((img,i)=>{
    const c=document.createElement("canvas");
    const ctx=c.getContext("2d");

    const h=500;
    c.height=h;
    c.width=img.width*(h/img.height);

    draw(ctx,img,c.width,c.height);

    c.onclick=()=>downloadSingle(img,i);
    preview.appendChild(c);
  });
}

/* DOWNLOAD */
function downloadSingle(img,i){
  const c=document.createElement("canvas");
  c.width=img.width;
  c.height=img.height;
  draw(c.getContext("2d"),img,c.width,c.height);

  const a=document.createElement("a");
  a.download=`img_${i}.png`;
  a.href=c.toDataURL();
  a.click();
}

async function download(){
  const zip=new JSZip();
  for(let i=0;i<images.length;i++){
    const c=document.createElement("canvas");
    const img=images[i];
    c.width=img.width;
    c.height=img.height;
    draw(c.getContext("2d"),img,c.width,c.height);
    zip.file(`img_${i}.png`,c.toDataURL().split(",")[1],{base64:true});
  }
  const blob=await zip.generateAsync({type:"blob"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="images.zip";
  a.click();
}
</script>

</body>
</html>
